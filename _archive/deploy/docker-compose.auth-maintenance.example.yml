services:
  codex-auth-maintenance:
    image: agent-sidecar:latest
    user: "10001:10001"
    entrypoint: ["codex", "login"]
    volumes:
      - codex-auth:/codex-auth:rw
    environment:
      CODEX_HOME: "/codex-auth"
    networks:
      - app_private

networks:
  app_private:
    driver: bridge

volumes:
  codex-auth:
